<script>
const API_URL='https://skazochnik-api.yura-900-977.workers.dev';

let selectedGender='boy',
selectedMood='fun',
selectedLength='medium',
fullStoryText='';

// ===== ТВОИ ФУНКЦИИ (НЕ ТРОГАЛ) =====

function selectGender(b){
    document.querySelectorAll('.gender-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    selectedGender=b.dataset.value
}

function selectMood(b){
    document.querySelectorAll('.mood-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    selectedMood=b.dataset.value
}

function selectLength(b){
    document.querySelectorAll('.length-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    selectedLength=b.dataset.value
}

// ===== СКАЗКИ (ТВОЙ КОД БЕЗ ИЗМЕНЕНИЙ) =====

async function generateTale(){
    const name=document.getElementById('childName').value.trim()||'Миша',
    age=document.getElementById('childAge').value,
    interests=document.getElementById('childInterests').value.trim()||'приключения';

    const btn=document.querySelector('.btn-generate'),
    result=document.getElementById('genResult'),
    loading=document.getElementById('genLoading'),
    container=document.getElementById('storyContainer'),
    storyText=document.getElementById('storyText'),
    storyTitle=document.getElementById('storyTitle'),
    storyMeta=document.getElementById('storyMeta'),
    storyActions=document.getElementById('storyActions');

    btn.disabled=true;
    result.classList.add('visible');
    loading.style.display='block';
    container.style.display='none';

    document.getElementById('loadingName').textContent='Пишем сказку для '+name;

    try{
        const response=await fetch(API_URL,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                name,
                age:parseInt(age),
                gender:selectedGender,
                interests,
                mood:selectedMood,
                length:selectedLength
            })
        });

        if(!response.ok) throw new Error('Ошибка сервера');

        const data=await response.json();

        loading.style.display='none';
        container.style.display='block';

        storyTitle.textContent='Сказка для '+name;
        storyMeta.textContent=age+' лет • '+interests;
        storyText.innerHTML=data.story || JSON.stringify(data);

    }catch(e){
        loading.style.display='none';
        container.style.display='block';
        storyText.innerHTML='Ошибка 😔';
    }

    btn.disabled=false;
}

// ===== ВОТ НОВОЕ (ЗАГАДКИ) =====

async function generateRiddle(){
    const name=document.getElementById('childName').value.trim()||'Миша';
    const age=document.getElementById('childAge').value;
    const interests=document.getElementById('childInterests').value.trim()||'животные';

    const result=document.getElementById('genResult');
    const loading=document.getElementById('genLoading');
    const container=document.getElementById('storyContainer');
    const storyText=document.getElementById('storyText');
    const storyTitle=document.getElementById('storyTitle');
    const storyMeta=document.getElementById('storyMeta');

    result.classList.add('visible');
    loading.style.display='block';
    container.style.display='none';

    document.getElementById('loadingName').textContent='Придумываем загадку...';

    try{
        const response = await fetch(API_URL + '/riddle',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                name,
                age:parseInt(age),
                interests
            })
        });

        if(!response.ok) throw new Error('Ошибка');

        const data = await response.json();

        loading.style.display='none';
        container.style.display='block';

        storyTitle.textContent='🧩 Загадка для '+name;
        storyMeta.textContent=age+' лет • '+interests;

        storyText.innerHTML = `
            <div style="font-size:18px;margin-bottom:16px">${data.riddle}</div>
            <div style="margin-top:20px;padding:12px;border-radius:12px;background:#FFF3E8">
                <b>Ответ:</b> ${data.answer}
            </div>
        `;

    }catch(e){
        loading.style.display='none';
        container.style.display='block';
        storyText.innerHTML='Ошибка загадки 😔';
    }
}
</script>
