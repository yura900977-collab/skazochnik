<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сказочник</title>

<style>
body{font-family:'Nunito',sans-serif;background:#FFFBF5;color:#2D1B0E;margin:0}
.container{max-width:800px;margin:0 auto;padding:40px}
h1{text-align:center}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #ddd}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:14px;font-weight:800;cursor:pointer}
.btn-story{background:#FF6B6B;color:#fff}
.btn-riddle{background:#6BCB77;color:#fff}
.result{margin-top:30px;white-space:pre-line;background:#fff;padding:20px;border-radius:16px}
</style>
</head>

<body>

<div class="container">
<h1>🪄 Сказочник</h1>

<input id="childName" placeholder="Имя ребёнка">
<select id="childAge">
<option value="4">4 года</option>
<option value="5">5 лет</option>
<option value="6">6 лет</option>
</select>

<input id="childInterests" placeholder="интересы">

<button class="btn-story" onclick="generateTale()">🪄 Создать сказку</button>
<button class="btn-riddle" onclick="generateRiddles()">🧩 Загадки</button>

<div id="result" class="result"></div>
</div>

<script>
const API_URL='https://skazochnik-api.yura-900-977.workers.dev';

async function generateTale(){
    const name=document.getElementById('childName').value||'Миша';
    const age=parseInt(document.getElementById('childAge').value);
    const interests=document.getElementById('childInterests').value||'приключения';

    const result=document.getElementById('result');
    result.textContent='Создаём сказку...';

    try{
        const res=await fetch(API_URL,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                name,
                age,
                gender:'boy',
                interests,
                mood:'fun',
                length:'medium'
            })
        });

        if(!res.ok){
            throw new Error('API ошибка');
        }

        const data=await res.text(); // ⚠️ важно

        result.textContent=data;

    }catch(e){
        result.textContent='Ошибка: '+e.message;
    }
}

function generateRiddles(){
    const name=document.getElementById('childName').value||'Миша';

    const riddles=[
        {q:`Я пушистый и люблю молоко. Кто я, ${name}?`,a:'Кот'},
        {q:`Большой с хоботом. Кто это?`,a:'Слон'},
        {q:`Летаю ночью. Кто я?`,a:'Сова'},
        {q:`Спит зимой. Кто это?`,a:'Медведь'},
        {q:`Прыгает по деревьям. Кто это?`,a:'Белка'}
    ];

    let text='Загадки для '+name+':\n\n';

    riddles.forEach((r,i)=>{
        text+=(i+1)+'. '+r.q+'\n👉 '+r.a+'\n\n';
    });

    document.getElementById('result').textContent=text;
}
</script>

</body>
</html>
