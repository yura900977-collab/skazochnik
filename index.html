<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сказочник</title>

<style>
body{font-family:sans-serif;background:#FFFBF5;padding:20px}
input,select{padding:10px;margin:5px;border-radius:8px;border:1px solid #ccc}
button{padding:12px 20px;border:none;border-radius:12px;margin:5px;cursor:pointer;font-weight:700}
.story{white-space:pre-line;margin-top:20px}
</style>
</head>

<body>

<h2>🪄 Сказочник</h2>

<input id="childName" placeholder="Имя ребёнка"><br>
<select id="childAge">
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
</select><br>

<input id="childInterests" placeholder="интересы"><br>

<button onclick="generateTale()">🪄 Сказка</button>
<button onclick="generateRiddles()">🧩 Загадки</button>

<div id="storyText" class="story"></div>

<script>
const API_URL='https://skazochnik-api.yura-900-977.workers.dev';

async function generateTale(){
    const name=document.getElementById('childName').value||'Миша';
    const age=document.getElementById('childAge').value;
    const interests=document.getElementById('childInterests').value||'приключения';

    document.getElementById('storyText').textContent='Создаём сказку...';

    try{
        const res=await fetch(API_URL,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({name,age:parseInt(age),interests})
        });

        const data=await res.json();
        document.getElementById('storyText').textContent=data.text||'Ошибка';
    }catch(e){
        document.getElementById('storyText').textContent='Ошибка сервера';
    }
}

function generateRiddles(){
    const name=document.getElementById('childName').value||'Миша';
    const interests=document.getElementById('childInterests').value||'животные';

    const riddles=[
        {q:`Я пушистый и усатый, люблю молоко. Кто я, ${name}?`,a:'Кот'},
        {q:`Большой, серый, с длинным хоботом. Кто это?`,a:'Слон'},
        {q:`Летаю ночью и люблю мышей. Кто я?`,a:'Сова'},
        {q:`Зимой спит, летом мёд ест. Кто это?`,a:'Медведь'},
        {q:`Прыгает по деревьям и любит орехи. Кто это?`,a:'Белка'}
    ];

    let text='Загадки для '+name+' 👇\n\n';

    riddles.forEach((r,i)=>{
        text+=(i+1)+'. '+r.q+'\n👉 '+r.a+'\n\n';
    });

    document.getElementById('storyText').textContent=text;
}
</script>

</body>
</html>
