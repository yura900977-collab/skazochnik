<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сказочник</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family:sans-serif;padding:20px;background:#fffaf5}
input,select,button {padding:10px;margin:5px;border-radius:8px;border:1px solid #ccc}
button {cursor:pointer}
#result {margin-top:20px;white-space:pre-line}
</style>
</head>

<body>

<h2>🪄 Сказочник</h2>

<input id="name" placeholder="Имя ребёнка"><br>
<select id="age">
<option>3</option>
<option>4</option>
<option>5</option>
</select><br>

<input id="interests" placeholder="интересы"><br>

<button onclick="story()">🪄 Сказка</button>
<button onclick="riddles()">🧩 Загадки</button>

<div id="result"></div>

<script>
const API_URL = 'https://skazochnik-api.yura-900-977.workers.dev';

async function story(){
    const name = document.getElementById('name').value || 'Миша';
    const age = document.getElementById('age').value;
    const interests = document.getElementById('interests').value || 'приключения';

    document.getElementById('result').textContent = 'Генерируем сказку...';

    const res = await fetch(API_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,age:parseInt(age),interests})
    });

    const data = await res.json();
    document.getElementById('result').textContent = data.text || 'Ошибка';
}

async function riddles(){
    const name = document.getElementById('name').value || 'Миша';
    const age = document.getElementById('age').value;
    const interests = document.getElementById('interests').value || 'животные';

    document.getElementById('result').textContent = 'Придумываем загадки...';

    const res = await fetch(API_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            type:"riddles",
            name,
            age:parseInt(age),
            interests
        })
    });

    const data = await res.json();

    if(data.riddles){
        let text='';
        data.riddles.forEach((r,i)=>{
            text += (i+1)+'. '+r.question+'\n👉 '+r.answer+'\n\n';
        });
        document.getElementById('result').textContent = text;
    } else {
        document.getElementById('result').textContent = data.text || 'Ошибка';
    }
}
</script>

</body>
</html>
